# LLM Gateway API Configuration
# Proxies WebSocket connections on port 8003 to the LLM Gateway service
# running inside the fciv-net container.
#
# This enables game_arena (and other LLM clients) to connect to the FreeCiv
# game server through the LLM Gateway API.

map $http_upgrade $connection_upgrade {
    default                         upgrade;
    ''                              close;
}

server {
    # Allow nginx to resolve container hostnames when proxy_pass uses variables
    # Docker's embedded DNS is available at 127.0.0.11 inside containers
    resolver                        127.0.0.11 valid=30s ipv6=off;

    listen                          8003;
    tcp_nodelay                     on;

    # Common proxy headers (keeps config concise and consistent)
    proxy_set_header                Host $host;
    proxy_set_header                X-Real-IP $remote_addr;
    proxy_set_header                X-Forwarded-For $proxy_add_x_forwarded_for;

    # WebSocket endpoint for LLM agents
    # Route: /ws/agent/{agent_id}
    location ~ /ws/agent/(.+) {
        proxy_pass                     http://fciv-net:8003/ws/agent/$1;
        proxy_http_version             1.1;
        proxy_set_header               Upgrade $http_upgrade;
        proxy_set_header               Connection $connection_upgrade;

        # WebSockets: do not buffer to reduce latency
        proxy_buffering                off;

        # Longer timeouts for LLM agents (game sessions can be long)
        proxy_connect_timeout          120s;
        proxy_send_timeout             120s;
        proxy_read_timeout             300s;
    }

    # WebSocket endpoint for spectators
    # Route: /ws/spectator/{game_id}
    location ~ /ws/spectator/(.+) {
        proxy_pass                     http://fciv-net:8003/ws/spectator/$1;
        proxy_http_version             1.1;
        proxy_set_header               Upgrade $http_upgrade;
        proxy_set_header               Connection $connection_upgrade;

        # WebSockets: do not buffer to reduce latency
        proxy_buffering                off;

        # Spectator timeouts (read-only, can be shorter)
        proxy_connect_timeout          60s;
        proxy_send_timeout             60s;
        proxy_read_timeout             180s;
    }

    # Health check endpoint
    location /health {
        proxy_pass                     http://fciv-net:8003/health;
        proxy_set_header               X-Real-IP $remote_addr;

        proxy_connect_timeout          10s;
        proxy_send_timeout             10s;
        proxy_read_timeout             10s;
    }

    # Metrics endpoint (if enabled)
    location /metrics {
        proxy_pass                     http://fciv-net:8003/metrics;
        proxy_set_header               X-Real-IP $remote_addr;

        proxy_connect_timeout          10s;
        proxy_send_timeout             10s;
        proxy_read_timeout             10s;
    }

    # Root endpoint (API info)
    location / {
        proxy_pass                     http://fciv-net:8003/;
        proxy_set_header               X-Real-IP $remote_addr;

        proxy_connect_timeout          10s;
        proxy_send_timeout             10s;
        proxy_read_timeout             10s;
    }
}
