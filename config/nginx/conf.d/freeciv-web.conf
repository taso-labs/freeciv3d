map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    resolver 127.0.0.11 valid=30s ipv6=off;
    listen 80;
    tcp_nodelay on;

    gzip on;
    gzip_comp_level 4;
    gzip_proxied any;
    gzip_types text/css application/json application/javascript text/javascript text/xml application/xml;

    # Common proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # WebSocket proxy for publite2 game instances (ports 7000-7999)
    # Publite2 creates one proxy per game on these ports
    location ~ ^/civsocket/7([0-9][0-9][0-9])$ {
        proxy_pass http://fciv-net:7$1/civsocket/7$1;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
    }

    # Status endpoint for each proxy instance
    location ~ ^/civsocket/7([0-9][0-9][0-9])/status$ {
        proxy_pass http://fciv-net:7$1/status;
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
    }

    # Static asset directories
    # CSS files reference absolute paths like url(/images/bg.jpg)
    location ~ ^/(images|webfonts)/ {
        rewrite ^(.*)$ /freeciv-web/$1 break;
        proxy_pass http://fciv-net:8080;
        expires 7d;
    }

    # Static files by extension
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|dae)$ {
        rewrite ^(?!/freeciv-web/)(.*)$ /freeciv-web/$1 break;
        proxy_pass http://fciv-net:8080;
        expires 7d;
    }

    # Publite2 status page
    location /pubstatus {
        proxy_pass http://fciv-net:4002;
    }

    # Metaserver endpoint (internal only for security)
    location = /meta/metaserver {
        allow 127.0.0.1;
        allow ::1;
        allow 172.16.0.0/12;
        deny all;
        proxy_pass http://fciv-net:8080;
    }

    # Homepage
    location = / {
        proxy_pass http://fciv-net:8080/freeciv-web/;
    }

    # All other requests to Tomcat webapp
    location / {
        rewrite ^(.*)$ /freeciv-web/$1 break;
        proxy_pass http://fciv-net:8080;
        client_max_body_size 15m;
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
    }
}
