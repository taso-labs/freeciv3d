map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    resolver 127.0.0.11 valid=30s ipv6=off;
    listen 80;
    tcp_nodelay on;

    gzip on;
    gzip_comp_level 4;
    gzip_proxied any;
    gzip_types text/css application/json application/javascript text/javascript text/xml application/xml;

    # Common proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # WebSocket proxy for publite2 game instances (ports 7000-7999)
    # Publite2 creates one proxy per game on these ports
    location ~ ^/civsocket/7([0-9][0-9][0-9])$ {
        proxy_pass http://fciv-net:7$1/civsocket/7$1;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
    }

    # Status endpoint for each proxy instance
    location ~ ^/civsocket/7([0-9][0-9][0-9])/status$ {
        proxy_pass http://fciv-net:7$1/status;
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
    }

    # Static asset directories with caching
    # ROOT.war deploys at / context, so no path rewriting needed
    location ~ ^/(images|webfonts)/ {
        proxy_pass http://fciv-net:8080;
        expires 7d;
    }

    # Static files by extension with caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|glb|gltf|dae)$ {
        proxy_pass http://fciv-net:8080;
        expires 7d;
    }

    # Publite2 status page
    location /pubstatus {
        proxy_pass http://fciv-net:4002;
    }

    # Metaserver endpoint (internal only for security)
    location = /meta/metaserver {
        allow 127.0.0.1;
        allow ::1;
        allow 172.16.0.0/12;
        deny all;
        proxy_pass http://fciv-net:8080;
    }

    # All requests to Tomcat webapp (ROOT.war at / context)
    location / {
        proxy_pass http://fciv-net:8080;
        client_max_body_size 15m;
        client_body_buffer_size 256k;      # Covers JSON API payloads; bodies >256k spill to disk (rare)
        proxy_buffer_size 128k;            # First response buffer — FreeCiv JSON state packets exceed 4k default
        proxy_buffers 8 128k;              # 8 x 128k = 1MB total for large game state responses
        proxy_busy_buffers_size 256k;      # Explicit: 2 × 128k single buffer (matches proxy_buffer_size)
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
    }
}
