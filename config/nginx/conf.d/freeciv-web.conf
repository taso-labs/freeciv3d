map $http_upgrade $connection_upgrade {
    default                         upgrade;
    ''                              close;
}

server {
    #                               allow nginx to resolve container hostnames when proxy_pass uses variables
    #                               Docker's embedded DNS is available at 127.0.0.11 inside containers
    resolver                        127.0.0.11 valid=30s ipv6=off;
    listen                          80;
    tcp_nodelay                     on;

    #                               Gzip: use balanced defaults to avoid high CPU on busy hosts.
    gzip                            on;
    gzip_comp_level                 4;
    gzip_proxied                    any;
    gzip_types                      text/css application/json application/javascript text/javascript text/xml application/xml application/rss+xml application/atom+xml;
    gzip_buffers                    8 4k;

    #                               Common proxy headers (keeps config concise and consistent)
    proxy_set_header                Host $host;
    proxy_set_header                X-Real-IP $remote_addr;
    proxy_set_header                X-Forwarded-For $proxy_add_x_forwarded_for;

    #                               proxy for websockets to the multiple freeciv-proxy server instances on port range [7000-7999].
    location ~ /civsocket/7([0-9][0-9][0-9]) {
        #                              proxy to the fciv-net service (Tomcat / freeciv-proxy instances)
        proxy_pass                     http://fciv-net:7$1/civsocket/7$1;
        proxy_http_version             1.1;
        proxy_set_header               Upgrade $http_upgrade;
        proxy_set_header               Connection $connection_upgrade;

        #                              Websockets: do not buffer to reduce latency.
        proxy_buffering                off;

        proxy_connect_timeout          90s;
        proxy_send_timeout             90s;
        proxy_read_timeout             90s;

    }

    #                               status for each Freeciv-proxy instance
    location ~ /civsocket/7([0-9][0-9][0-9])/status {
        proxy_pass                     http://fciv-net:7$1/status;
        proxy_set_header               X-Real-IP $remote_addr;

        proxy_connect_timeout          90s;
        proxy_send_timeout             90s;
        proxy_read_timeout             90s;

    }

    # location for maps and logs in the data "webapp"
    location ~ /data/.*\.(gif|log|png)$ {
        proxy_pass                     http://fciv-net:8080;
        proxy_redirect                 off;

        proxy_set_header               Host $host;

        client_max_body_size           15m;
        client_body_buffer_size        128k;

        proxy_connect_timeout          90s;
        proxy_send_timeout             90s;
        proxy_read_timeout             90s;

        proxy_buffer_size              4k;
        proxy_buffers                  4 32k;
        proxy_busy_buffers_size        64k;
        proxy_temp_file_write_size     64k;
    }

    #                               no other stuff should be accessible in /data
    location ~ /data/ {
        return                         403;
    }

    # SPECTATOR FIX: Static asset directories (/images/, /webfonts/)
    # These paths come from CSS files that use absolute paths like url(/images/bg.jpg)
    # Must come BEFORE the file extension location block below
    location ~ ^/(images|webfonts)/ {
        rewrite                        ^(.*)$ /freeciv-web/$1 break;
        proxy_pass                     http://fciv-net:8080;
        proxy_redirect                 off;

        expires                        7d;

        proxy_set_header               Host $host;

        client_max_body_size           3m;
        client_body_buffer_size        128k;

        proxy_connect_timeout          90s;
        proxy_send_timeout             90s;
        proxy_read_timeout             90s;

        proxy_buffer_size              4k;
        proxy_buffers                  4 32k;
        proxy_busy_buffers_size        64k;
        proxy_temp_file_write_size     64k;
    }

    # location for javascript, css and images by file extension
    # SPECTATOR FIX: Added woff2, ttf, woff, eot, svg for FontAwesome fonts
    location ~* \.(js|css|png|jpg|dae|woff2|ttf|woff|eot|svg)$ {
        # HOMEPAGE FIX: Rewrite to add /freeciv-web context path ONLY if not already present
        rewrite                        ^(?!/freeciv-web/)(.*)$ /freeciv-web/$1 break;
        proxy_pass                     http://fciv-net:8080;
        proxy_redirect                 off;

        expires                        7d;

        proxy_set_header               Host $host;

        client_max_body_size           3m;
        client_body_buffer_size        128k;

        proxy_connect_timeout          90s;
        proxy_send_timeout             90s;
        proxy_read_timeout             90s;

        proxy_buffer_size              4k;
        proxy_buffers                  4 32k;
        proxy_busy_buffers_size        64k;
        proxy_temp_file_write_size     64k;


    }

    #                               status page for Publite2 at /pubstatus
    location ~ /pubstatus {
        proxy_pass                     http://fciv-net:4002;
        proxy_redirect                 off;

        proxy_set_header               Host $host;
        proxy_set_header               X-Real-IP $remote_addr;
        proxy_set_header               X-Forwarded-For $proxy_add_x_forwarded_for;

    }

    #                               status page for PBEM at /mailstatus
    location ~ /mailstatus {
        proxy_pass                     http://fciv-net:4003;
        proxy_redirect                 off;

        proxy_set_header               Host $host;
        proxy_set_header               X-Real-IP $remote_addr;
        proxy_set_header               X-Forwarded-For $proxy_add_x_forwarded_for;

    }

    #                               status page for PBEM at /pbemstatus
    location ~ /pbemstatus {
        proxy_pass                     http://fciv-net:4003;
        proxy_redirect                 off;

        proxy_set_header               Host $host;
        proxy_set_header               X-Real-IP $remote_addr;
        proxy_set_header               X-Forwarded-For $proxy_add_x_forwarded_for;

    }

    location = / {
        proxy_pass                     http://fciv-net:8080/freeciv-web/;
        proxy_redirect                 off;
    }

    #                               Allow the metaserver endpoint only from trusted internal sources (loopback and docker network).
    #                               We keep it closed to the public. Adjust the CIDR below if your Docker network differs.
    location = /meta/metaserver {
        allow                          127.0.0.1;
        allow                          ::1;
        #                              Docker bridge / user-defined network; adjust if your Docker uses other ranges.
        allow                          172.16.0.0/12;
        deny                           all;
        proxy_pass                     http://fciv-net:8080;
        proxy_set_header               Host $host;
        proxy_set_header               X-Real-IP $remote_addr;
        proxy_set_header               X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    #                               proxy for app-server on port 8080
    location ~ / {
        rewrite                        ^(.*)$ /freeciv-web/$1 break;
        proxy_pass                     http://fciv-net:8080;
        proxy_redirect                 off;


        proxy_set_header               Host $host;
        proxy_set_header               X-Real-IP $remote_addr;
        proxy_set_header               X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_max_temp_file_size       0;

        client_max_body_size           15m;
        client_body_buffer_size        128k;

        proxy_connect_timeout          90s;
        proxy_send_timeout             90s;
        proxy_read_timeout             90s;

        proxy_buffer_size              4k;
        proxy_buffers                  4 32k;
        proxy_busy_buffers_size        64k;
        proxy_temp_file_write_size     64k;
    }
}
