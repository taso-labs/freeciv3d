# Stream (TCP) proxy mappings for Freeciv services.
# Each server listens on a host port and proxies TCP to the internal
# service on the Docker network.

# Earth Mapgen
server {
    listen 8002;
    proxy_pass fciv-net:8002;
    proxy_timeout 10m;
    proxy_connect_timeout 30s;
}

# fciv proxy ports 7000-7009 -> fciv-net:7000-7009
server { listen 7000-7009; proxy_pass fciv-net:$server_port; proxy_timeout 10m; proxy_connect_timeout 30s; }
