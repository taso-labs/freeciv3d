# Main nginx configuration for Freeciv3D
# This file is mounted into the nginx container via docker-compose.yml
# and overrides the default /etc/nginx/nginx.conf from nginx:1.29 image.
#
# Purpose: Defines the top-level nginx structure (workers, logging, http context)
# The http block includes conf.d/*.conf which loads freeciv-web.conf for routing.

user  nginx;
# Auto-detect CPU cores. Total capacity = cores × worker_connections.
# With 8192 worker_connections: 1 core = 8k, 2 cores = 16k, 4 cores = 32k connections.
# Minimum 2 cores recommended for production (16k capacity for 2,700 viewers).
worker_processes  auto;

# Log errors at 'warn' level (less verbose than default 'notice')
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  8192;  # Max concurrent connections per worker (scaled for 1000+ viewers)
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    # Performance optimizations
    sendfile        on;   # Efficient file serving
    tcp_nopush      on;   # Send headers in one packet (works with sendfile)
    keepalive_timeout  65;

    # Header buffer sizes — default 1k/4×8k is too small when multiple observer
    # iframes share a domain and accumulate Tomcat JSESSIONID cookies across retries
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;

    # Load all HTTP server configurations from conf.d/
    # This includes conf.d/freeciv-web.conf which defines routing rules
    include /etc/nginx/conf.d/*.conf;
}
