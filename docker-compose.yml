services:
  fciv-net:
    image: freeciv/fciv-net
    build: .
    container_name: fciv-net
    command: [ "sleep", "infinity" ]
    environment:
      DB_HOST: db
      DB_USER: docker
      DB_PASSWORD: changeme
      DB_NAME: freeciv_web
      CACHE_HMAC_SECRET: "d664ed20fcce9ef8d0177f01a5ae408b96272a7202c642e0e7e127622cd3acce67fff861b7b6e5b1b3e2d6696886e6fe8d8b98c5e6db83f7236c31560bf9aac4"
      # Redis configuration for DistributedRateLimiter (used by freeciv-proxy)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Optionally set a password via an environment variable on the host
      REDIS_PASSWORD: ""
    volumes:
      - ./freeciv-web:/docker/freeciv-web-shared
    depends_on:
      flyway:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      nginx:
        condition: service_started
    ports:
      # Expose only the services that should be reachable directly from host
      - "4002:4002"
      - "6000-6009:6000-6009"
      - "7100-7109:7000-7009"
      - "8002:8002"
    user: docker
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/about" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  db:
    image: mariadb:11.7
    container_name: fciv-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: changeme
      MYSQL_DATABASE: freeciv_web
      MYSQL_USER: docker
      MYSQL_PASSWORD: changeme
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      start_period: 1m
      start_interval: 10s
      interval: 1m
      timeout: 5s
      retries: 3

  flyway:
    image: flyway/flyway:11
    container_name: fciv-flyway
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Mount the SQL migration files that live in the project
      - ./freeciv-web/src/main/resources/db/migration:/flyway/sql:ro
    environment:
      FLYWAY_URL: jdbc:mariadb://db:3306/freeciv_web?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      FLYWAY_USER: docker
      FLYWAY_PASSWORD: changeme
    # Allow Flyway to retry connecting while the DB finishes starting. We
    # explicitly set the migrations location to avoid the future deprecation
    # warning about scanning 'sql'. Increase retries and interval for slow DB
    # startups.
    command: [ "-connectRetries=60", "-connectRetriesInterval=2", "-locations=filesystem:/flyway/sql", "migrate" ]
    restart: "no"

  redis:
    image: redis:8
    container_name: fciv-redis
    # For local development we run Redis without a password by default. To enable
    # authentication set the REDIS_PASSWORD environment variable before running
    # docker-compose (and update `REDIS_PASSWORD` in other services accordingly).
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  nginx:
    image: nginx:1.29
    container_name: fciv-nginx
    ports:
      # Preserve historical host binding on :8080 used by scripts/docs
      - "8080:80"
      - "443:443"
    volumes:
      # Server config is provided directly in conf.d to avoid mount-order issues
      - ./config/nginx/conf.d/freeciv-web.conf:/etc/nginx/conf.d/freeciv-web.conf:ro
      - ./config/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./config/nginx/snippets:/etc/nginx/snippets:ro
      - ./freeciv-web:/docker/freeciv-web-shared:ro
    restart: unless-stopped

volumes:
  mysql_data:
  redis-data:
