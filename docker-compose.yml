services:

  redis:
    image: redis:7-alpine
    container_name: fciv-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: fciv-mysql-db
    environment:
      - MYSQL_ROOT_PASSWORD=changeme
      - MYSQL_DATABASE=freeciv_web
      - MYSQL_USER=docker
      - MYSQL_PASSWORD=changeme
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "docker", "--password=changeme"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  fciv-net:
    image: freeciv/fciv-net
    build:
      context: .
      target: runtime
      args:
        - SKIP_FREECIV_BUILD=${SKIP_FREECIV_BUILD:-false}
        - BUILD_JOBS=${BUILD_JOBS:-2}
    container_name: fciv-net
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    command: ["/bin/bash", "-c", "(sleep 30; /docker/freeciv-web-shared/startup-spectator.sh) & sleep infinity"]
    environment:
      # Database Configuration
      - DB_HOST=mysql
      - DB_USER=docker
      - DB_PASSWORD=changeme
      - DB_NAME=freeciv_web
      # LLM Gateway Configuration
      - CACHE_HMAC_SECRET=${CACHE_HMAC_SECRET:-75d6fd1ee3fb974b9a04f64eae2d48f2d7acdbc294cda59bc75485bcfe0bf861}
      - API_KEY_SECRET=${API_KEY_SECRET:-test12345678901234567890123456789012}
      - LLM_API_TOKENS=${LLM_API_TOKENS:-test-token-fc3d-001,test-token-fc3d-002}
      - SESSION_TIMEOUT_SECONDS=${SESSION_TIMEOUT_SECONDS:-3600}
      - MAX_LLM_AGENTS=${MAX_LLM_AGENTS:-10}
      - MAX_SESSIONS_PER_PLAYER=${MAX_SESSIONS_PER_PLAYER:-3}
      - CACHE_TTL_SECONDS=${CACHE_TTL_SECONDS:-5}
      - REQUESTS_PER_SECOND=${REQUESTS_PER_SECOND:-10}
      - BURST_CAPACITY=${BURST_CAPACITY:-100}
      - DEFAULT_CIVSERVER_PORT=${DEFAULT_CIVSERVER_PORT:-6001}
      # Redis Configuration
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./freeciv-web:/docker/freeciv-web-shared
      - .:/docker/project-root
    ports:
      - "8080:80"
      - "4002:4002"
      - "6000-6009:6000-6009"
      - "7100-7109:7000-7009"
      - "8888:8080"
      - "8002:8002"
      - "8003:8003"
    user: docker
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f tomcat10 && curl -sf http://localhost:8080/freeciv-web/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

volumes:
  data:
  mysql_data:
  redis_data:
