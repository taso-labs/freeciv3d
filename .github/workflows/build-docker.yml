name: Build Docker Images

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g., 0.1.0 or latest)'
        required: true
        default: 'latest'

env:
  STAGING_PROJECT: clashai-staging
  REGION: us-central1

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/978279426764/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-sa@clashai-staging.iam.gserviceaccount.com

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push fciv-net to staging
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.STAGING_PROJECT }}/${{ env.STAGING_PROJECT }}-registry/fciv-net:${{ steps.tag.outputs.tag }}
            ${{ env.REGION }}-docker.pkg.dev/${{ env.STAGING_PROJECT }}/${{ env.STAGING_PROJECT }}-registry/fciv-net:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output build summary
        run: |
          echo "## 🐳 Docker Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`fciv-net:${{ steps.tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** \`${{ env.REGION }}-docker.pkg.dev/${{ env.STAGING_PROJECT }}/${{ env.STAGING_PROJECT }}-registry\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Image is available in staging registry. Production promotion happens during deploy-production workflow." >> $GITHUB_STEP_SUMMARY
