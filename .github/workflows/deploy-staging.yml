name: Deploy to Staging

on:
  # Trigger when build-docker completes (no branch filter - works for releases too)
  workflow_run:
    workflows: ['Build Docker Images']
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g., 0.1.0 or latest)'
        required: false
        default: 'latest'

env:
  GCP_PROJECT: clashai-staging
  GKE_CLUSTER: clashai-staging-gke
  GKE_REGION: us-central1
  APP_NAMESPACE: freeciv
  REGISTRY: us-central1-docker.pkg.dev/clashai-staging/clashai-staging-registry

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only run if triggered manually or if the build workflow succeeded
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/978279426764/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-sa@clashai-staging.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_REGION }}
          project_id: ${{ env.GCP_PROJECT }}

      - name: Install Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Determine version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            # Get version from latest GitHub release tag (more reliable than VERSION file)
            # Release tags are formatted as: freeciv3d-vX.Y.Z
            LATEST_TAG=$(gh api repos/${{ github.repository }}/releases/latest --jq '.tag_name' 2>/dev/null || echo "")

            if [ -n "$LATEST_TAG" ]; then
              # Extract version number: freeciv3d-v0.2.4 -> 0.2.4
              VERSION="${LATEST_TAG#freeciv3d-v}"
              echo "Using version from release tag: $VERSION"
              echo "version=$VERSION" >> $GITHUB_OUTPUT
            else
              # Fallback to latest if no release found
              echo "No release found, using 'latest' tag"
              echo "version=latest" >> $GITHUB_OUTPUT
            fi
          fi

      # Notify Slack that deployment is starting (best-effort, won't fail deployment)
      - name: Notify Slack deployment started
        id: slack_start
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: "C09T4FTME8K"
            text: "Staging deployment started"
            blocks:
              - type: "header"
                text:
                  type: "plain_text"
                  text: "🚀 Staging Deployment Started"
                  emoji: true
              - type: "section"
                fields:
                  - type: "mrkdwn"
                    text: "*Environment:*\nStaging"
                  - type: "mrkdwn"
                    text: "*Version:*\n`${{ steps.version.outputs.version }}`"
              - type: "section"
                fields:
                  - type: "mrkdwn"
                    text: "*Triggered by:*\n${{ github.actor }}"
                  - type: "mrkdwn"
                    text: "*Trigger:*\n${{ github.event_name == 'workflow_dispatch' && 'Manual' || 'Automatic' }}"
              - type: "context"
                elements:
                  - type: "mrkdwn"
                    text: "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow Run>"

      - name: Update Kustomize images
        run: |
          cd k8s/overlays/staging
          kustomize edit set image fciv-net=${{ env.REGISTRY }}/fciv-net:${{ steps.version.outputs.version }}

      - name: Create namespace if not exists
        run: |
          kubectl create namespace ${{ env.APP_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Kustomize manifests
        run: |
          kubectl apply -k k8s/overlays/staging

      - name: Run database migrations
        run: |
          echo "=== Running Flyway Database Migrations ==="

          # Delete existing Job if it exists (Jobs are immutable)
          kubectl delete job flyway-migrate -n ${{ env.APP_NAMESPACE }} --ignore-not-found=true

          # Wait for deletion to complete (avoids race condition)
          kubectl wait --for=delete job/flyway-migrate -n ${{ env.APP_NAMESPACE }} --timeout=60s 2>/dev/null || true

          # Re-apply just the Flyway Job to trigger a new run
          kubectl apply -k k8s/overlays/staging

          # Wait for the Job to complete (timeout after 5 minutes)
          echo "Waiting for Flyway migration to complete..."
          if ! kubectl wait --for=condition=complete job/flyway-migrate -n ${{ env.APP_NAMESPACE }} --timeout=300s; then
            echo "::error::Flyway migration failed or timed out"
            echo ""
            echo "=== Flyway Job Status ==="
            kubectl get job flyway-migrate -n ${{ env.APP_NAMESPACE }} -o wide
            echo ""
            echo "=== Flyway Pod Logs ==="
            kubectl logs -l app=flyway-migrate -n ${{ env.APP_NAMESPACE }} --all-containers=true --tail=100
            exit 1
          fi

          echo "✓ Database migrations completed successfully"
          echo ""
          echo "=== Migration Job Status ==="
          kubectl get job flyway-migrate -n ${{ env.APP_NAMESPACE }}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/fciv-net -n ${{ env.APP_NAMESPACE }} --timeout=300s
          kubectl rollout status deployment/redis -n ${{ env.APP_NAMESPACE }} --timeout=120s

      - name: Verify deployment
        run: |
          echo "=== Deployment Status ==="
          kubectl get deployments -n ${{ env.APP_NAMESPACE }}
          echo ""
          echo "=== Pod Status ==="
          kubectl get pods -n ${{ env.APP_NAMESPACE }}
          echo ""
          echo "=== Services ==="
          kubectl get services -n ${{ env.APP_NAMESPACE }}

      # Slack thread reply on success (best-effort, won't fail deployment)
      - name: Notify Slack on success
        if: success() && steps.slack_start.outputs.ts
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: "C09T4FTME8K"
            thread_ts: "${{ steps.slack_start.outputs.ts }}"
            text: "✅ Staging deployment successful"
            blocks:
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "✅ *Deployment completed successfully!*"
              - type: "section"
                fields:
                  - type: "mrkdwn"
                    text: "*Version:*\n`${{ steps.version.outputs.version }}`"
                  - type: "mrkdwn"
                    text: "*URL:*\n<https://staging.freeciv3d.example.com|staging>"
              - type: "actions"
                elements:
                  - type: "button"
                    text:
                      type: "plain_text"
                      text: "View Workflow Run"
                      emoji: true
                    url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      # Slack thread reply on failure (best-effort, won't affect job status)
      - name: Notify Slack on failure
        if: failure() && steps.slack_start.outputs.ts
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: "C09T4FTME8K"
            thread_ts: "${{ steps.slack_start.outputs.ts }}"
            text: "❌ Staging deployment failed"
            blocks:
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "❌ *Deployment failed!*"
              - type: "section"
                fields:
                  - type: "mrkdwn"
                    text: "*Version:*\n`${{ steps.version.outputs.version }}`"
                  - type: "mrkdwn"
                    text: "*Status:*\nManual intervention required"
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "⚠️ Check the workflow run for details."
              - type: "actions"
                elements:
                  - type: "button"
                    text:
                      type: "plain_text"
                      text: "View Workflow Run"
                      emoji: true
                    url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    style: "danger"
