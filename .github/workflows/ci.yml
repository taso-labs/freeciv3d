name: continuous integration

on:
  - pull_request
  - push
  - workflow_dispatch

jobs:
  # Job 1: Validate Flyway migrations against MySQL 8.0
  flyway-migrations:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: freeciv_web
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4.1.1

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run Flyway migrations
        run: |
          # Download Flyway CLI
          wget -qO- https://download.red-gate.com/maven/release/com/redgate/flyway/flyway-commandline/10.6.0/flyway-commandline-10.6.0-linux-x64.tar.gz | tar xvz

          # Run migrations against test MySQL
          ./flyway-10.6.0/flyway \
            -url="jdbc:mysql://localhost:3306/freeciv_web?useSSL=false&allowPublicKeyRetrieval=true" \
            -user=root \
            -password=testpassword \
            -locations="filesystem:freeciv-web/src/main/resources/db/migration" \
            migrate

          echo "✅ All Flyway migrations passed!"

  normal:
    runs-on: ubuntu-latest
    steps:
      - name: check out Freeciv-web
        uses: actions/checkout@v4.1.1
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven    
      - name: prepare
        run: |
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.default.disable_ipv6=1
          ip addr # for confirmation. can be skipped
          sudo apt-get remove ^postgresql 'mysql.*'
          sudo rm -rf /var/lib/mysql
      - name: install
        shell: bash
        run: ./scripts/install/install.sh --mode=TEST

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov
          pip install tornado  # Required by freeciv-proxy
          pip install -r llm-gateway/requirements.txt

      - name: Run freeciv-proxy tests
        env:
          CACHE_HMAC_SECRET: '8dc50280f151af309d728c951584576f205688dc82d7d295174f2ef1b3e32181'
          LLM_API_TOKENS: 'test-token-123'
          API_KEY_SECRET: 'test-api-key-secret-for-ci'
        run: |
          cd freeciv-proxy && python -m pytest tests/ -v --tb=short \
            --ignore=tests/test_load_stress.py \
            --ignore=tests/test_pause_resume.py \
            --ignore=tests/test_state_extractor.py \
            --ignore=tests/test_unit_move_format.py
