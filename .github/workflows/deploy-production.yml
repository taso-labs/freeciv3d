name: Deploy to Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g., 0.1.0)'
        required: true
      confirm:
        description: 'Type "DEPLOY" to confirm production deployment'
        required: true

env:
  GCP_PROJECT: clashai-production
  GKE_CLUSTER: clashai-production-gke
  GKE_REGION: us-central1
  APP_NAMESPACE: freeciv
  REGISTRY: us-central1-docker.pkg.dev/clashai-production/clashai-production-registry

permissions:
  contents: read
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'release' || github.event.inputs.confirm == 'DEPLOY' }}
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "version=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Validate confirmation
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirm != 'DEPLOY'
        run: |
          echo "::error::Production deployment requires confirmation. Please type 'DEPLOY' in the confirm field."
          exit 1

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/364210626442/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-sa@clashai-production.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_REGION }}
          project_id: ${{ env.GCP_PROJECT }}

      - name: Install Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Update Kustomize images
        run: |
          cd k8s/overlays/production
          kustomize edit set image fciv-net=${{ env.REGISTRY }}/fciv-net:${{ needs.validate.outputs.version }}

      - name: Create namespace if not exists
        run: |
          kubectl create namespace ${{ env.APP_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Kustomize manifests
        run: |
          kubectl apply -k k8s/overlays/production

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/fciv-net -n ${{ env.APP_NAMESPACE }} --timeout=600s
          kubectl rollout status deployment/redis -n ${{ env.APP_NAMESPACE }} --timeout=120s

      - name: Verify deployment
        run: |
          echo "=== Production Deployment Status ==="
          kubectl get deployments -n ${{ env.APP_NAMESPACE }}
          echo ""
          echo "=== Pod Status ==="
          kubectl get pods -n ${{ env.APP_NAMESPACE }}
          echo ""
          echo "=== Services ==="
          kubectl get services -n ${{ env.APP_NAMESPACE }}

      - name: Create deployment annotation
        run: |
          kubectl annotate deployment fciv-net -n ${{ env.APP_NAMESPACE }} \
            kubernetes.io/change-cause="Deployed version ${{ needs.validate.outputs.version }} via GitHub Actions" \
            --overwrite
