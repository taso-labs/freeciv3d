name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g., 0.1.0)'
        required: true
      confirm:
        description: 'Type "DEPLOY" to confirm production deployment'
        required: true

env:
  GCP_PROJECT: clashai-production
  GKE_CLUSTER: clashai-production-gke
  GKE_REGION: us-central1
  APP_NAMESPACE: freeciv
  REGISTRY: us-central1-docker.pkg.dev/clashai-production/clashai-production-registry
  STAGING_REGISTRY: us-central1-docker.pkg.dev/clashai-staging/clashai-staging-registry

permissions:
  contents: read
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'release' || github.event.inputs.confirm == 'DEPLOY' }}
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            # Extract version from release tag: freeciv3d-v0.2.4 -> 0.2.4
            RELEASE_TAG="${{ github.event.release.tag_name }}"
            VERSION="${RELEASE_TAG#freeciv3d-v}"
            echo "Extracted version $VERSION from release tag $RELEASE_TAG"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Validate confirmation
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirm != 'DEPLOY'
        run: |
          echo "::error::Production deployment requires confirmation. Please type 'DEPLOY' in the confirm field."
          exit 1

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/364210626442/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-sa@clashai-production.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Promote Docker image from staging to production
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PROD_IMAGE="${{ env.REGISTRY }}/fciv-net:${VERSION}"
          STAGING_IMAGE="${{ env.STAGING_REGISTRY }}/fciv-net:${VERSION}"

          echo "Checking if fciv-net image needs promotion..."
          echo "Production image: $PROD_IMAGE"
          echo "Staging image: $STAGING_IMAGE"
          echo ""

          # Check if image already exists in production (idempotent)
          if gcloud artifacts docker images describe "$PROD_IMAGE" --project=${{ env.GCP_PROJECT }} &>/dev/null; then
            echo "✓ Image already exists in production registry - skipping promotion"
          else
            echo "Image not found in production - promoting from staging using gcrane..."
            echo ""

            # Install gcrane (Google's official tool for copying container images)
            echo "Installing gcrane..."
            go install github.com/google/go-containerregistry/cmd/gcrane@latest
            export PATH="$PATH:$(go env GOPATH)/bin"

            # Authenticate gcrane with gcloud credentials
            gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

            # Use gcrane to efficiently copy image from staging to production
            # Benefits over docker pull/tag/push:
            # - Skips layers already in destination (faster)
            # - More efficient bandwidth usage
            # - Google's recommended approach for Artifact Registry
            echo "Copying image from staging to production..."
            gcrane cp "$STAGING_IMAGE" "$PROD_IMAGE"

            echo ""
            echo "✓ Image promoted from staging to production using gcrane"
          fi

          echo ""
          echo "✓ Production image ready: $PROD_IMAGE"

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/364210626442/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-sa@clashai-production.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_REGION }}
          project_id: ${{ env.GCP_PROJECT }}

      - name: Install Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      # Notify Slack that deployment is starting (best-effort, won't fail deployment)
      - name: Notify Slack deployment started
        id: slack_start
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: "C09T4FTME8K"
            text: "Production deployment started"
            blocks:
              - type: "header"
                text:
                  type: "plain_text"
                  text: "🚀 Production Deployment Started"
                  emoji: true
              - type: "section"
                fields:
                  - type: "mrkdwn"
                    text: "*Environment:*\nProduction"
                  - type: "mrkdwn"
                    text: "*Version:*\n`${{ needs.validate.outputs.version }}`"
              - type: "section"
                fields:
                  - type: "mrkdwn"
                    text: "*Triggered by:*\n${{ github.actor }}"
                  - type: "mrkdwn"
                    text: "*Trigger:*\n${{ github.event_name == 'workflow_dispatch' && 'Manual' || 'Automatic' }}"
              - type: "context"
                elements:
                  - type: "mrkdwn"
                    text: "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow Run>"

      - name: Update Kustomize images
        run: |
          cd k8s/overlays/production
          kustomize edit set image fciv-net=${{ env.REGISTRY }}/fciv-net:${{ needs.validate.outputs.version }}

      - name: Create namespace if not exists
        run: |
          kubectl create namespace ${{ env.APP_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Kustomize manifests
        run: |
          kubectl apply -k k8s/overlays/production

      - name: Run database migrations
        run: |
          echo "=== Running Flyway Database Migrations ==="

          # Delete existing Job if it exists (Jobs are immutable)
          kubectl delete job flyway-migrate -n ${{ env.APP_NAMESPACE }} --ignore-not-found=true

          # Wait for deletion to complete (avoids race condition)
          kubectl wait --for=delete job/flyway-migrate -n ${{ env.APP_NAMESPACE }} --timeout=60s 2>/dev/null || true

          # Re-apply just the Flyway Job to trigger a new run
          kubectl apply -k k8s/overlays/production

          # Wait for the Job to complete (timeout after 5 minutes)
          echo "Waiting for Flyway migration to complete..."
          if ! kubectl wait --for=condition=complete job/flyway-migrate -n ${{ env.APP_NAMESPACE }} --timeout=300s; then
            echo "::error::Flyway migration failed or timed out"
            echo ""
            echo "=== Flyway Job Status ==="
            kubectl get job flyway-migrate -n ${{ env.APP_NAMESPACE }} -o wide
            echo ""
            echo "=== Flyway Pod Logs ==="
            kubectl logs -l app=flyway-migrate -n ${{ env.APP_NAMESPACE }} --all-containers=true --tail=100
            exit 1
          fi

          echo "✓ Database migrations completed successfully"
          echo ""
          echo "=== Migration Job Status ==="
          kubectl get job flyway-migrate -n ${{ env.APP_NAMESPACE }}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/fciv-net -n ${{ env.APP_NAMESPACE }} --timeout=600s
          kubectl rollout status deployment/redis -n ${{ env.APP_NAMESPACE }} --timeout=120s

      - name: Verify deployment
        run: |
          echo "=== Production Deployment Status ==="
          kubectl get deployments -n ${{ env.APP_NAMESPACE }}
          echo ""
          echo "=== Pod Status ==="
          kubectl get pods -n ${{ env.APP_NAMESPACE }}
          echo ""
          echo "=== Services ==="
          kubectl get services -n ${{ env.APP_NAMESPACE }}

      - name: Create deployment annotation
        run: |
          kubectl annotate deployment fciv-net -n ${{ env.APP_NAMESPACE }} \
            kubernetes.io/change-cause="Deployed version ${{ needs.validate.outputs.version }} via GitHub Actions" \
            --overwrite

      - name: Generate deployment summary
        run: |
          echo "## ✅ Production Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ needs.validate.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Namespace:** \`${{ env.APP_NAMESPACE }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Cluster:** \`${{ env.GKE_CLUSTER }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment Status" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          kubectl get deployment fciv-net -n ${{ env.APP_NAMESPACE }} -o wide >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      # Slack thread reply on success (best-effort, won't fail deployment)
      - name: Notify Slack on success
        if: success() && steps.slack_start.outputs.ts
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: "C09T4FTME8K"
            thread_ts: "${{ steps.slack_start.outputs.ts }}"
            text: "✅ Production deployment successful"
            blocks:
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "✅ *Deployment completed successfully!*"
              - type: "section"
                fields:
                  - type: "mrkdwn"
                    text: "*Version:*\n`${{ needs.validate.outputs.version }}`"
                  - type: "mrkdwn"
                    text: "*URL:*\n<https://agentclash.ai|agentclash.ai>"
              - type: "actions"
                elements:
                  - type: "button"
                    text:
                      type: "plain_text"
                      text: "View Workflow Run"
                      emoji: true
                    url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      # Slack thread reply on failure (best-effort, won't affect job status)
      - name: Notify Slack on failure
        if: failure() && steps.slack_start.outputs.ts
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: "C09T4FTME8K"
            thread_ts: "${{ steps.slack_start.outputs.ts }}"
            text: "❌ Production deployment failed"
            blocks:
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "❌ *Deployment failed!*"
              - type: "section"
                fields:
                  - type: "mrkdwn"
                    text: "*Version:*\n`${{ needs.validate.outputs.version }}`"
                  - type: "mrkdwn"
                    text: "*Status:*\nManual intervention required"
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "⚠️ Check the workflow run for details."
              - type: "actions"
                elements:
                  - type: "button"
                    text:
                      type: "plain_text"
                      text: "View Workflow Run"
                      emoji: true
                    url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    style: "danger"
