apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-credentials
  namespace: freeciv3d
  labels:
    app.kubernetes.io/part-of: freeciv3d
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcpsm-secret-store
  target:
    name: db-credentials
    creationPolicy: Owner
  data:
    - secretKey: connection-string
      remoteRef:
        # This key will be patched by Kustomize overlays
        key: freeciv3d-staging-db-connection-string
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: llm-gateway-secrets
  namespace: freeciv3d
  labels:
    app.kubernetes.io/part-of: freeciv3d
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcpsm-secret-store
  target:
    name: llm-gateway-secrets
    creationPolicy: Owner
  data:
    - secretKey: cache-hmac-secret
      remoteRef:
        key: freeciv-cache-hmac-secret
    - secretKey: api-key-secret
      remoteRef:
        key: freeciv-api-key-secret
