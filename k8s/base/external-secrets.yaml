apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-credentials
  namespace: freeciv
  labels:
    app.kubernetes.io/part-of: freeciv
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcpsm-secret-store
  target:
    name: db-credentials
    creationPolicy: Owner
  data:
    - secretKey: connection-string
      remoteRef:
        # This key will be patched by Kustomize overlays
        key: freeciv3d-staging-db-connection-string
    - secretKey: username
      remoteRef:
        # Patched by overlays: freeciv-{staging,production}-db-username
        key: freeciv-staging-db-username
    - secretKey: password
      remoteRef:
        # Patched by overlays: freeciv-{staging,production}-db-password
        key: freeciv-staging-db-password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: llm-gateway-secrets
  namespace: freeciv
  labels:
    app.kubernetes.io/part-of: freeciv
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcpsm-secret-store
  target:
    name: llm-gateway-secrets
    creationPolicy: Owner
  data:
    - secretKey: cache-hmac-secret
      remoteRef:
        key: freeciv-cache-hmac-secret
    - secretKey: api-key-secret
      remoteRef:
        key: freeciv-api-key-secret
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: llm-api-tokens
  namespace: freeciv
  labels:
    app.kubernetes.io/part-of: freeciv
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcpsm-secret-store
  target:
    name: llm-api-tokens
    creationPolicy: Owner
  data:
    - secretKey: tokens
      remoteRef:
        # Shared auth tokens for LLM agent → freeciv communication
        key: freeciv-llm-api-tokens
---
# YouTube OAuth credentials for streaming
# MVP: Only global channel credential needed
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: youtube-oauth-credentials
  namespace: freeciv
  labels:
    app.kubernetes.io/part-of: freeciv
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcpsm-secret-store
  target:
    name: youtube-oauth-credentials
    creationPolicy: Owner
  data:
    # OAuth credentials JSON for global view stream
    - secretKey: global
      remoteRef:
        key: freeciv-youtube-oauth-global
    # Future: Add player1, player2 when multi-view is implemented
    # - secretKey: player1
    #   remoteRef:
    #     key: freeciv-youtube-oauth-player1
    # - secretKey: player2
    #   remoteRef:
    #     key: freeciv-youtube-oauth-player2
