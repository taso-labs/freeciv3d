apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-agent-clash
  namespace: freeciv
  labels:
    app.kubernetes.io/part-of: freeciv
  annotations:
    description: "Allow ingress from agent-clash namespace to access freeciv services"
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: agent-clash
      ports:
        # LLM Gateway WebSocket
        - port: 8003
          protocol: TCP
        # FreeCiv Web interface
        - port: 8080
          protocol: TCP
        # FreeCiv Proxy
        - port: 8002
          protocol: TCP
