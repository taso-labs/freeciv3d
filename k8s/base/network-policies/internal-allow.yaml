apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal
  namespace: freeciv
  labels:
    app.kubernetes.io/part-of: freeciv
  annotations:
    description: "Allow all traffic within freeciv namespace"
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
      ports:
        # All internal service ports
        - port: 8003
          protocol: TCP
        - port: 8080
          protocol: TCP
        - port: 8002
          protocol: TCP
        - port: 5556
          protocol: TCP
        - port: 6379
          protocol: TCP
