apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal
  namespace: freeciv
  labels:
    app.kubernetes.io/part-of: freeciv
  annotations:
    description: "Allow all traffic within freeciv namespace"
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
      ports:
        # All internal service ports
        - port: 8080  # Tomcat webapp
          protocol: TCP
        - port: 8002  # FreeCiv proxy for LLM
          protocol: TCP
        - port: 8003  # LLM Gateway API
          protocol: TCP
        - port: 6379  # Redis
          protocol: TCP
