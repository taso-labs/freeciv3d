apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-gateway-config
  namespace: freeciv
  labels:
    app: llm-gateway
    component: game-integration
data:
  # FreeCiv server connection
  freeciv-server-host: "fciv-net.freeciv.svc.cluster.local"
  freeciv-server-port: "8002"

  # Redis configuration
  redis-host: "redis.freeciv.svc.cluster.local"
  redis-port: "6379"

  # WebSocket configuration
  bind-addr: "0.0.0.0:8003"
  log-level: "info"
