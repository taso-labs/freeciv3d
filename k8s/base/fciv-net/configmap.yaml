apiVersion: v1
kind: ConfigMap
metadata:
  name: fciv-net-config
  namespace: freeciv
  labels:
    app: fciv-net
    component: game-server
data:
  # Service ports
  # - 8080: Tomcat webapp (freeciv-web)
  # - 8002: FreeCiv proxy for LLM Gateway
  # - 8003: LLM Gateway API
  # - 7001-7009: Per-game proxy ports (managed by publite2)
  freeciv-web-port: "8080"
  freeciv-proxy-port: "8002"
  llm-gateway-port: "8003"

  # Database configuration (host via Cloud SQL Proxy sidecar)
  db-host: "127.0.0.1"
  db-port: "3306"
  db-name: "freeciv_web"

  # Redis configuration
  redis-host: "redis.freeciv.svc.cluster.local"
  redis-port: "6379"

  # Logging
  log-level: "info"

  # Distributed Tracing (OpenTelemetry with GCP Cloud Trace)
  # Disabled for cost reduction (maintenance mode). Set to "true" to re-enable.
  # Requires roles/cloudtrace.agent on the service account
  enable-cloud-trace: "false"
