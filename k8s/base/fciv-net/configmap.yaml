apiVersion: v1
kind: ConfigMap
metadata:
  name: fciv-net-config
  namespace: freeciv3d
  labels:
    app: fciv-net
    component: game-server
data:
  # Game server configuration
  freeciv-port: "5556"
  freeciv-web-port: "8080"
  freeciv-proxy-port: "8002"
  freeciv-game-mode: "bot-competition"
  max-players: "4"
  turn-timeout: "300"

  # Database configuration (host via Cloud SQL Proxy)
  db-host: "127.0.0.1"
  db-port: "3306"
  db-name: "freeciv_web"

  # Redis configuration
  redis-host: "redis.freeciv3d.svc.cluster.local"
  redis-port: "6379"

  # Logging
  log-level: "info"
