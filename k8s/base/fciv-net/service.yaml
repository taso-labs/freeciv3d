apiVersion: v1
kind: Service
metadata:
  name: fciv-net
  namespace: freeciv
  labels:
    app: fciv-net
    component: game-server
  annotations:
    cloud.google.com/backend-config: '{"default": "fciv-net-backend"}'
spec:
  type: NodePort  # Required for GKE Ingress (ClusterIP not supported)
  selector:
    app: fciv-net
  ports:
    # Route web traffic through nginx sidecar for WebSocket proxy support
    # nginx proxies to Tomcat (localhost:8080) and game proxies (localhost:7XXX)
    - name: web
      port: 8080
      targetPort: 8081  # nginx sidecar port (Tomcat uses 8080 internally)
      protocol: TCP
    - name: proxy
      port: 8002
      targetPort: proxy
      protocol: TCP
    - name: llm-gateway
      port: 8003
      targetPort: llm-gateway
      protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 7200
