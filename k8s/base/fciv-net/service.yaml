apiVersion: v1
kind: Service
metadata:
  name: fciv-net
  namespace: freeciv
  labels:
    app: fciv-net
    component: game-server
  annotations:
    cloud.google.com/backend-config: '{"default": "fciv-net-backend"}'
spec:
  type: ClusterIP
  selector:
    app: fciv-net
  ports:
    - name: web
      port: 8080
      targetPort: web
      protocol: TCP
    - name: proxy
      port: 8002
      targetPort: proxy
      protocol: TCP
    - name: llm-gateway
      port: 8003
      targetPort: llm-gateway
      protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 7200
