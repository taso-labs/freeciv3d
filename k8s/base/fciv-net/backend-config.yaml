apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: fciv-net-backend
  namespace: freeciv
  labels:
    app: fciv-net
spec:
  # Session affinity for WebSocket connections
  # CRITICAL: Without this, GKE HTTP(S) LB may route WebSocket frames to different pods,
  # causing "half-open" connections where server→client data stops flowing.
  #
  # Using GENERATED_COOKIE for session affinity:
  # - Creates a GCLB cookie that routes subsequent requests to the same pod
  # - Works correctly when scaled to 1 replica (current production configuration)
  #
  # Note on multi-replica deployments:
  # With multiple replicas, cookie affinity ensures requests go to a CONSISTENT pod,
  # but not necessarily the CORRECT pod for each game (the pod where the game was allocated).
  # This is why production is currently scaled to 1 replica. For horizontal scaling,
  # see the pod-aware game allocation design in Linear.
  sessionAffinity:
    affinityType: "GENERATED_COOKIE"
    affinityCookieTtlSec: 7200  # 2 hours - matches service sessionAffinity timeout
  # Explicit health check - overrides stale auto-generated GCE health check
  # Required because GKE doesn't auto-update health checks when readiness probe changes
  # Note: Don't specify port - let GKE use the serving port (NodePort 32744)
  healthCheck:
    checkIntervalSec: 30
    timeoutSec: 10
    healthyThreshold: 1
    unhealthyThreshold: 3
    type: HTTP
    requestPath: /
  customResponseHeaders:
    headers:
      # Note: X-Frame-Options ALLOW-FROM is deprecated and not supported in Chrome/Edge/Safari
      # Using CSP frame-ancestors instead (modern standard, supported by all browsers)
      - "Content-Security-Policy: frame-ancestors 'self' https://clashai.live https://*.clashai.live"
  timeoutSec: 3600
  connectionDraining:
    drainingTimeoutSec: 60
