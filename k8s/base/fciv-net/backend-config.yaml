apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: fciv-net-backend
  namespace: freeciv
  labels:
    app: fciv-net
spec:
  # Explicit health check - overrides stale auto-generated GCE health check
  # Required because GKE doesn't auto-update health checks when readiness probe changes
  # Note: Don't specify port - let GKE use the serving port (NodePort 32744)
  healthCheck:
    checkIntervalSec: 30
    timeoutSec: 10
    healthyThreshold: 1
    unhealthyThreshold: 3
    type: HTTP
    requestPath: /
  customResponseHeaders:
    headers:
      # Note: X-Frame-Options ALLOW-FROM is deprecated and not supported in Chrome/Edge/Safari
      # Using CSP frame-ancestors instead (modern standard, supported by all browsers)
      - "Content-Security-Policy: frame-ancestors 'self' https://*.clashai.live"
  timeoutSec: 3600
  connectionDraining:
    drainingTimeoutSec: 60
