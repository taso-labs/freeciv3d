apiVersion: apps/v1
kind: Deployment
metadata:
  name: fciv-net
  namespace: freeciv
  labels:
    app: fciv-net
    component: game-server
    version: v1
  annotations:
    description: "FreeCiv 3D game server with Cloud SQL Proxy sidecar"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fciv-net
  template:
    metadata:
      labels:
        app: fciv-net
        component: game-server
        version: v1
    spec:
      serviceAccountName: freeciv-sa

      # Cloud SQL Proxy as native sidecar (K8s 1.28+)
      initContainers:
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.3
          restartPolicy: Always
          args:
            - "--structured-logs"
            - "--port=3306"
            - "--private-ip"
            - "--auto-iam-authn"
            - "--max-sigterm-delay=30s"
            - "--health-check"
            - "--http-address=0.0.0.0"
            # Instance connection name - patched by overlay
            - "PLACEHOLDER:us-central1:PLACEHOLDER"
          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP
            - name: health
              containerPort: 9801
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

      containers:
        - name: fciv-net
          image: fciv-net
          imagePullPolicy: Always
          # Override CMD to keep container running after entrypoint completes
          # Entrypoint runs docker-entrypoint.sh, then exec's args
          args: ["sleep", "infinity"]

          ports:
            - name: web
              containerPort: 8080
              protocol: TCP
            - name: proxy
              containerPort: 8002
              protocol: TCP
            - name: llm-gateway
              containerPort: 8003
              protocol: TCP
            # Per-game proxy ports (7001-7009), publite2 status (4002)
            # are also available but managed internally

          env:
            # Database connection via Cloud SQL Proxy
            - name: DB_HOST
              value: "127.0.0.1"
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: "freeciv_web"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: connection-string

            # Redis connection
            - name: REDIS_HOST
              value: "redis.freeciv.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"

            # Game server configuration
            - name: FREECIV_WEB_PORT
              value: "8080"
            - name: FREECIV_PROXY_PORT
              value: "8002"

            # Application configuration
            - name: LOG_LEVEL
              value: "info"
            - name: ENABLE_BOT_API
              value: "true"

            # LLM Gateway secrets (for integrated llm-gateway)
            - name: CACHE_HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: llm-gateway-secrets
                  key: cache-hmac-secret
            - name: API_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: llm-gateway-secrets
                  key: api-key-secret
            - name: LLM_API_TOKENS
              valueFrom:
                secretKeyRef:
                  name: llm-api-tokens
                  key: tokens

          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi

          # Startup probe: Wait for Tomcat to start (TCP check on port 8080)
          # Max wait: 30s initial + (60 * 10s) = 630s total startup time
          startupProbe:
            tcpSocket:
              port: web
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60

          # Liveness probe: Check Tomcat is responding (every 20s for faster failure detection)
          livenessProbe:
            tcpSocket:
              port: web
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 3

          # Readiness probe: Check webapp is deployed and responding
          readinessProbe:
            httpGet:
              path: /freeciv-web/
              port: web
            initialDelaySeconds: 120  # Wait for webapp deployment
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 6

          volumeMounts:
            - name: game-data
              mountPath: /var/lib/freeciv
            - name: game-logs
              mountPath: /var/log/freeciv

          # SECURITY: Container runs as non-root (docker user, UID 1001)
          # Dockerfile pre-creates directories with group-write permissions
          # and uses Docker-specific startup script without sudo
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL

      volumes:
        - name: game-data
          emptyDir: {}
        - name: game-logs
          emptyDir: {}

      dnsPolicy: ClusterFirst
      restartPolicy: Always
      terminationGracePeriodSeconds: 60
