apiVersion: apps/v1
kind: Deployment
metadata:
  name: fciv-net
  namespace: freeciv
  labels:
    app: fciv-net
    component: game-server
    version: v1
  annotations:
    description: "FreeCiv 3D game server with Cloud SQL Proxy sidecar"
spec:
  replicas: 1
  # Recreate strategy required: ReadWriteOnce PVC can only mount on one node.
  # RollingUpdate would deadlock (new pod can't mount PVC while old pod holds it).
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: fciv-net
  template:
    metadata:
      labels:
        app: fciv-net
        component: game-server
        version: v1
    spec:
      serviceAccountName: freeciv-sa

      # Cloud SQL Proxy as native sidecar (K8s 1.28+)
      initContainers:
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.3
          restartPolicy: Always
          args:
            - "--structured-logs"
            - "--port=3306"
            - "--private-ip"
            # Note: Using password auth (not --auto-iam-authn) since MySQL user is password-based
            - "--max-sigterm-delay=30s"
            - "--health-check"
            - "--http-address=0.0.0.0"
            # Instance connection name - patched by overlay
            - "PLACEHOLDER:us-central1:PLACEHOLDER"
          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP
            - name: health
              containerPort: 9801
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

      containers:
        - name: fciv-net
          image: fciv-net
          imagePullPolicy: Always
          # Override CMD to keep container running after entrypoint completes
          # Entrypoint runs docker-entrypoint.sh, then exec's args
          args: ["sleep", "infinity"]

          ports:
            - name: web
              containerPort: 8080
              protocol: TCP
            - name: proxy
              containerPort: 8002
              protocol: TCP
            - name: llm-gateway
              containerPort: 8003
              protocol: TCP
            # Per-game proxy ports (7001-7009), publite2 status (4002)
            # are also available but managed internally

          env:
            # Database connection via Cloud SQL Proxy
            - name: DB_HOST
              value: "127.0.0.1"
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: "freeciv_web"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: connection-string

            # Database connection pool sizing
            # Base values suitable for multi-replica deployments.
            # With MySQL max_connections=150: allows up to 6 replicas × 25 = 150
            # Production (1 replica): could increase, but 25 is sufficient for game workloads
            - name: DB_POOL_SIZE
              value: "20"
            - name: DB_POOL_MAX
              value: "25"

            # Redis connection
            - name: REDIS_HOST
              value: "redis.freeciv.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            - name: GATEWAY_REDIS_URL
              value: "redis://redis.freeciv.svc.cluster.local:6379"

            # Game server configuration
            - name: FREECIV_WEB_PORT
              value: "8080"
            - name: FREECIV_PROXY_PORT
              value: "8002"

            # Application configuration
            - name: LOG_LEVEL
              value: "info"
            - name: ENABLE_BOT_API
              value: "true"

            # Session timeout configuration
            # SESSION_TIMEOUT_SECONDS: Max session lifetime (default: 1 hour)
            # SESSION_SUSPENSION_TIMEOUT_SECS: Suspended session reconnect window (default: 24 hours)
            - name: SESSION_TIMEOUT_SECONDS
              value: "3600"
            - name: SESSION_SUSPENSION_TIMEOUT_SECS
              value: "86400"
            # Gateway stale game reaper: end sessions idle longer than this.
            # Set high to accommodate multi-hour matches and API credit outages.
            - name: GATEWAY_STALE_GAME_TIMEOUT
              value: "21600"
            # Warn once (per idle period) when a session crosses this idle duration.
            - name: GATEWAY_STALE_GAME_WARN_THRESHOLD
              value: "3600"

            # Distributed tracing (OpenTelemetry with GCP Cloud Trace)
            - name: ENABLE_CLOUD_TRACE
              valueFrom:
                configMapKeyRef:
                  name: fciv-net-config
                  key: enable-cloud-trace
            # OTLP endpoint for OpenTelemetry (in-cluster collector)
            - name: OTLP_ENDPOINT
              value: "http://opentelemetry-collector.opentelemetry.svc.cluster.local:4317"
            # Resource attributes - patched per environment (staging default)
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "gcp.project_id=clashai-staging"
            # GCP project ID for Cloud Trace integration
            - name: GOOGLE_CLOUD_PROJECT
              value: "clashai-staging"

            # LLM Gateway secrets (for integrated llm-gateway)
            - name: CACHE_HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: llm-gateway-secrets
                  key: cache-hmac-secret
            - name: API_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: llm-gateway-secrets
                  key: api-key-secret
            - name: LLM_API_TOKENS
              valueFrom:
                secretKeyRef:
                  name: llm-api-tokens
                  key: tokens

            # Observer URL generation - base URL for FreeCiv web client
            # This is used by LLM Gateway to generate observer iframe URLs
            # Must be HTTPS public URL (not internal K8s DNS) for browser access
            # ROOT.war deploys at / context, so no path prefix needed
            - name: GATEWAY_FREECIV_WEB_BASE_URL
              value: "https://freeciv.clashai.live"

            # Worldmap camera zoom mode for global observer view recordings
            # "dynamic" = camera tracks combined territory of all agents (default)
            # "static"  = camera fits entire map at all times
            # Used by stream_manager.py when building observer URLs for streaming jobs
            - name: WORLDMAP_ZOOM_MODE
              value: "dynamic"

            # YouTube OAuth credentials for streaming (MVP: global view only)
            - name: YOUTUBE_CREDS_GLOBAL
              valueFrom:
                secretKeyRef:
                  name: youtube-oauth-credentials
                  key: global
                  optional: true  # Streaming is optional - game works without it

          # Base resource defaults (production overlay may increase these)
          # Node affinity for high-memory pools is configured in production overlay
          # when limits exceed primary pool capacity (e2-standard-4: 4 vCPU, 16GB)
          resources:
            requests:
              cpu: 300m       # Increased from 200m for LLM game processing
              memory: 768Mi   # Increased from 512Mi to handle state extraction, caching
            limits:
              cpu: 1000m
              memory: 2Gi

          # Startup probe: Wait for Tomcat to start (TCP check on port 8080)
          # Max wait: 30s initial + (60 * 10s) = 630s total startup time
          startupProbe:
            tcpSocket:
              port: web
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60

          # Liveness probe: Check all critical services are responding
          # Checks: Tomcat (8080), freeciv-proxy (8002), llm-gateway (8003)
          # Uses Python for TCP checks since it's required by llm-gateway
          # If any service is down, pod restarts to restore all services
          livenessProbe:
            exec:
              command:
                - python3
                - -c
                - |
                  import socket
                  ports = [8080, 8002, 8003]
                  for p in ports:
                      s = socket.socket()
                      try:
                          s.settimeout(5)
                          s.connect(('localhost', p))
                      finally:
                          s.close()
            initialDelaySeconds: 90  # Increased to allow all services to start
            periodSeconds: 30  # Increased from 20s to reduce overhead
            timeoutSeconds: 15  # Increased to account for checking 3 ports
            failureThreshold: 3

          # Readiness probe: Check webapp is deployed and responding
          # ROOT.war deploys at / context
          readinessProbe:
            httpGet:
              path: /
              port: web
            initialDelaySeconds: 120  # Wait for webapp deployment
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 6

          volumeMounts:
            - name: game-data
              mountPath: /var/lib/tomcat10/webapps/data/savegames
            - name: game-logs
              mountPath: /var/log/freeciv

          # SECURITY: Container runs as non-root (docker user, UID 1001)
          # Dockerfile pre-creates directories with group-write permissions
          # and uses Docker-specific startup script without sudo
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL

        # Nginx sidecar for WebSocket routing
        # Required because GKE Ingress routes directly to Tomcat, but observers
        # need /civsocket/7XXX paths routed to per-game proxy ports (7001-7009)
        - name: nginx
          image: nginxinc/nginx-unprivileged:1.25-alpine
          ports:
            - name: http
              containerPort: 8081  # unprivileged nginx (8080 is used by Tomcat)
              protocol: TCP
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          # Startup probe: Give Tomcat time to deploy ROOT.war (60-90s)
          # Nginx starts fast but proxies to Tomcat which is slow to start
          # Without this, readiness/liveness fail while Tomcat is starting
          startupProbe:
            httpGet:
              path: /
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12    # 30s + (12 * 10s) = 150s max startup time
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 8081
            initialDelaySeconds: 10   # Increased from 5s
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8081
            initialDelaySeconds: 30   # Increased from 10s
            periodSeconds: 30
            timeoutSeconds: 5
          securityContext:
            runAsNonRoot: true
            runAsUser: 101  # nginx user in alpine image
            runAsGroup: 101
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL

      volumes:
        - name: game-data
          persistentVolumeClaim:
            claimName: fciv-net-game-data
        - name: game-logs
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: fciv-net-nginx-config

      dnsPolicy: ClusterFirst
      restartPolicy: Always
      terminationGracePeriodSeconds: 60
