apiVersion: apps/v1
kind: Deployment
metadata:
  name: fciv-net
  namespace: freeciv
  labels:
    app: fciv-net
    component: game-server
    version: v1
  annotations:
    description: "FreeCiv 3D game server with Cloud SQL Proxy sidecar"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fciv-net
  template:
    metadata:
      labels:
        app: fciv-net
        component: game-server
        version: v1
    spec:
      serviceAccountName: freeciv-sa

      # Cloud SQL Proxy as native sidecar (K8s 1.28+)
      initContainers:
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.3
          restartPolicy: Always
          args:
            - "--structured-logs"
            - "--port=3306"
            - "--private-ip"
            - "--auto-iam-authn"
            - "--max-sigterm-delay=30s"
            - "--health-check"
            - "--http-address=0.0.0.0"
            # Instance connection name - patched by overlay
            - "PLACEHOLDER:us-central1:PLACEHOLDER"
          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP
            - name: health
              containerPort: 9801
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

      containers:
        - name: fciv-net
          image: fciv-net
          imagePullPolicy: Always

          ports:
            - name: game
              containerPort: 5556
              protocol: TCP
            - name: web
              containerPort: 8080
              protocol: TCP
            - name: proxy
              containerPort: 8002
              protocol: TCP

          env:
            # Database connection via Cloud SQL Proxy
            - name: DB_HOST
              value: "127.0.0.1"
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: "freeciv_web"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: connection-string

            # Redis connection
            - name: REDIS_HOST
              value: "redis.freeciv.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"

            # Game server configuration
            - name: FREECIV_PORT
              value: "5556"
            - name: FREECIV_WEB_PORT
              value: "8080"
            - name: FREECIV_PROXY_PORT
              value: "8002"
            - name: FREECIV_GAME_MODE
              value: "bot-competition"
            - name: FREECIV_MAX_PLAYERS
              value: "4"
            - name: FREECIV_TURN_TIMEOUT
              value: "300"

            # Application configuration
            - name: LOG_LEVEL
              value: "info"
            - name: ENABLE_BOT_API
              value: "true"

          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi

          startupProbe:
            tcpSocket:
              port: game
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 60  # 300s max startup time (freeciv server is slow to start)

          livenessProbe:
            tcpSocket:
              port: game
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            tcpSocket:
              port: game
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2

          volumeMounts:
            - name: game-data
              mountPath: /var/lib/freeciv
            - name: game-logs
              mountPath: /var/log/freeciv

          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault

      volumes:
        - name: game-data
          emptyDir: {}
        - name: game-logs
          emptyDir: {}

      dnsPolicy: ClusterFirst
      restartPolicy: Always
      terminationGracePeriodSeconds: 60
