apiVersion: v1
kind: ServiceAccount
metadata:
  name: fciv-net-sa
  namespace: freeciv3d
  labels:
    app: fciv-net
    component: game-server
  annotations:
    iam.gke.io/gcp-service-account: fciv-net-sa@clashai-staging.iam.gserviceaccount.com
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fciv-net-role
  namespace: freeciv3d
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods", "services"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fciv-net-rolebinding
  namespace: freeciv3d
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: fciv-net-role
subjects:
- kind: ServiceAccount
  name: fciv-net-sa
  namespace: freeciv3d
