apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Inherit from base
resources:
  - ../../base

# Environment label
labels:
  - pairs:
      environment: staging

# Image configuration
images:
  - name: fciv-net
    newName: us-central1-docker.pkg.dev/clashai-staging/clashai-staging-registry/fciv-net
    newTag: latest

# Replica configuration for staging
replicas:
  - name: fciv-net
    count: 1
  - name: redis
    count: 1

# Patches for environment-specific configuration
patches:
  # Patch fciv-net deployment with Cloud SQL instance
  - target:
      kind: Deployment
      name: fciv-net
    patch: |-
      - op: replace
        path: /spec/template/spec/initContainers/0/args/7
        value: "clashai-staging:us-central1:freeciv-staging-db-4e19c888"

  # Patch unified ServiceAccount for Workload Identity
  - target:
      kind: ServiceAccount
      name: freeciv-sa
    patch: |-
      - op: replace
        path: /metadata/annotations/iam.gke.io~1gcp-service-account
        value: "gateway-sa@clashai-staging.iam.gserviceaccount.com"

  # Patch External Secret for staging DB
  - target:
      kind: ExternalSecret
      name: db-credentials
    patch: |-
      - op: replace
        path: /spec/data/0/remoteRef/key
        value: "freeciv-staging-db-connection-string"

  # Patch HPA limits for staging
  - target:
      kind: HorizontalPodAutoscaler
      name: fciv-net-hpa
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3

# ConfigMap generator for staging-specific config
configMapGenerator:
  - name: staging-config
    literals:
      - ENVIRONMENT=staging
      - LOG_LEVEL=debug
