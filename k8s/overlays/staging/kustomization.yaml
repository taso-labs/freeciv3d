apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Inherit from base
resources:
  - ../../base

# Environment label
labels:
  - pairs:
      environment: staging

# Image configuration
images:
  - name: fciv-net
    newName: us-central1-docker.pkg.dev/clashai-staging/clashai-staging-registry/fciv-net
    newTag: latest

# Replica configuration for staging
replicas:
  - name: fciv-net
    count: 1
  - name: redis
    count: 1

# Patches for environment-specific configuration
patches:
  # Patch fciv-net deployment with Cloud SQL instance
  - target:
      kind: Deployment
      name: fciv-net
    patch: |-
      - op: replace
        path: /spec/template/spec/initContainers/0/args/6
        value: "clashai-staging:us-central1:freeciv-staging-db-4e19c888"

  # Patch unified ServiceAccount for Workload Identity
  - target:
      kind: ServiceAccount
      name: freeciv-sa
    patch: |-
      - op: replace
        path: /metadata/annotations/iam.gke.io~1gcp-service-account
        value: "gateway-sa@clashai-staging.iam.gserviceaccount.com"

  # Patch External Secret for staging DB
  - target:
      kind: ExternalSecret
      name: db-credentials
    patch: |-
      - op: replace
        path: /spec/data/0/remoteRef/key
        value: "freeciv-staging-db-connection-string"

  # Patch HPA limits for staging (single replica to minimize costs)
  - target:
      kind: HorizontalPodAutoscaler
      name: fciv-net-hpa
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 1

  # Patch Ingress for staging static IP and domain
  - target:
      kind: Ingress
      name: fciv-net-public
    patch: |-
      - op: replace
        path: /metadata/annotations/kubernetes.io~1ingress.global-static-ip-name
        value: "freeciv-staging-public-ip"
      - op: replace
        path: /spec/rules/0/host
        value: "freeciv-staging.clashai.live"

  # Patch ManagedCertificate for staging domain
  - target:
      kind: ManagedCertificate
      name: fciv-net-cert
    patch: |-
      - op: replace
        path: /spec/domains/0
        value: "freeciv-staging.clashai.live"

  # Patch Deployment with staging FreeCiv web URL for observer iframes
  # This URL is used by LLM Gateway to generate observer iframe URLs
  # ROOT.war deploys at / context, so no path prefix needed
  # Uses strategic merge patch to avoid fragile index-based references
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: fciv-net
      spec:
        template:
          spec:
            containers:
            - name: fciv-net
              env:
              - name: GATEWAY_FREECIV_WEB_BASE_URL
                value: "https://freeciv-staging.clashai.live"
    target:
      kind: Deployment
      name: fciv-net

  # Patch Flyway Job with Cloud SQL instance
  - target:
      kind: Job
      name: flyway-migrate
    patch: |-
      - op: replace
        path: /spec/template/spec/initContainers/0/args/6
        value: "clashai-staging:us-central1:freeciv-staging-db-4e19c888"

  # Use Recreate strategy for staging (brief downtime OK, no need for RollingUpdate)
  - target:
      kind: Deployment
      name: fciv-net
    patch: |-
      - op: add
        path: /spec/strategy
        value:
          type: Recreate

  # Staging resource limits (match production, fit e2-small nodes)
  - target:
      kind: Deployment
      name: fciv-net
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "200m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "512Mi"

  # Disable YouTube streaming until feature is complete
  # Observer mode continues to work normally without streaming
  - target:
      kind: Deployment
      name: fciv-net
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: STREAMING_MODE
          value: "disabled"

  # Patch OTEL resource attributes and GCP project for staging (strategic merge patch)
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: fciv-net
      spec:
        template:
          spec:
            containers:
            - name: fciv-net
              env:
              - name: OTEL_RESOURCE_ATTRIBUTES
                value: "gcp.project_id=clashai-staging"
              - name: GOOGLE_CLOUD_PROJECT
                value: "clashai-staging"
    target:
      kind: Deployment
      name: fciv-net

# ConfigMap generator for staging-specific config
configMapGenerator:
  - name: staging-config
    literals:
      - ENVIRONMENT=staging
      - LOG_LEVEL=debug
