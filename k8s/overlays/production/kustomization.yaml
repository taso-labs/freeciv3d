apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Inherit from base
resources:
  - ../../base

# Environment label
labels:
  - pairs:
      environment: production

# Image configuration
images:
  - name: fciv-net
    newName: us-central1-docker.pkg.dev/clashai-production/clashai-production-registry/fciv-net
    newTag: latest

# Replica configuration for production
replicas:
  - name: fciv-net
    count: 2
  - name: redis
    count: 1

# Patches for environment-specific configuration
patches:
  # Patch fciv-net deployment with Cloud SQL instance
  - target:
      kind: Deployment
      name: fciv-net
    patch: |-
      - op: replace
        path: /spec/template/spec/initContainers/0/args/6
        value: "clashai-production:us-central1:freeciv-production-db-9cc3ef1e"

  # Patch unified ServiceAccount for Workload Identity
  - target:
      kind: ServiceAccount
      name: freeciv-sa
    patch: |-
      - op: replace
        path: /metadata/annotations/iam.gke.io~1gcp-service-account
        value: "gateway-sa@clashai-production.iam.gserviceaccount.com"

  # Patch External Secret for production DB
  - target:
      kind: ExternalSecret
      name: db-credentials
    patch: |-
      - op: replace
        path: /spec/data/0/remoteRef/key
        value: "freeciv-production-db-connection-string"
      - op: replace
        path: /spec/data/1/remoteRef/key
        value: "freeciv-production-db-username"
      - op: replace
        path: /spec/data/2/remoteRef/key
        value: "freeciv-production-db-password"

  # Patch HPA limits for production
  - target:
      kind: HorizontalPodAutoscaler
      name: fciv-net-hpa
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 2
      - op: replace
        path: /spec/maxReplicas
        value: 5

  # Production resource limits (reduced to fit e2-small nodes)
  - target:
      kind: Deployment
      name: fciv-net
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "200m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1000m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "2Gi"

  # Patch Ingress for production static IP
  - target:
      kind: Ingress
      name: fciv-net-public
    patch: |-
      - op: replace
        path: /metadata/annotations/kubernetes.io~1ingress.global-static-ip-name
        value: "freeciv-production-public-ip"

  # Patch Flyway Job with Cloud SQL instance
  - target:
      kind: Job
      name: flyway-migrate
    patch: |-
      - op: replace
        path: /spec/template/spec/initContainers/0/args/6
        value: "clashai-production:us-central1:freeciv-production-db-9cc3ef1e"

  # Disable YouTube streaming until feature is complete
  # Observer mode continues to work normally without streaming
  - target:
      kind: Deployment
      name: fciv-net
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: STREAMING_MODE
          value: "disabled"

  # Patch OTEL resource attributes and GCP project for production (strategic merge patch)
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: fciv-net
      spec:
        template:
          spec:
            containers:
            - name: fciv-net
              env:
              - name: OTEL_RESOURCE_ATTRIBUTES
                value: "gcp.project_id=clashai-production"
              - name: GOOGLE_CLOUD_PROJECT
                value: "clashai-production"
    target:
      kind: Deployment
      name: fciv-net

  # Production scheduling: tolerations, node affinity, and pod anti-affinity
  # - Tolerations: Allow scheduling on high-memory nodes (tainted with workload=high-memory)
  # - Node affinity: Prefer high-memory pool if available, but allow primary pool
  # - Pod anti-affinity: Spread replicas across nodes for HA
  - target:
      kind: Deployment
      name: fciv-net
    patch: |-
      - op: add
        path: /spec/template/spec/tolerations
        value:
          - key: workload
            operator: Equal
            value: high-memory
            effect: NoSchedule
      - op: add
        path: /spec/template/spec/affinity
        value:
          nodeAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 10
                preference:
                  matchExpressions:
                    - key: cloud.google.com/gke-nodepool
                      operator: In
                      values:
                        - clashai-production-gke-highmem-pool
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchLabels:
                      app: fciv-net
                  topologyKey: kubernetes.io/hostname

# ConfigMap generator for production-specific config
configMapGenerator:
  - name: production-config
    literals:
      - ENVIRONMENT=production
      - LOG_LEVEL=info
