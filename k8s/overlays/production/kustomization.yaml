apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Inherit from base
resources:
  - ../../base

# Environment label
labels:
  - pairs:
      environment: production

# Image configuration
images:
  - name: fciv-net
    newName: us-central1-docker.pkg.dev/clashai-production/clashai-production-registry/fciv-net
    newTag: latest

# Replica configuration for production
replicas:
  - name: fciv-net
    count: 2
  - name: redis
    count: 1

# Patches for environment-specific configuration
patches:
  # Patch fciv-net deployment with Cloud SQL instance
  - target:
      kind: Deployment
      name: fciv-net
    patch: |-
      - op: replace
        path: /spec/template/spec/initContainers/0/args/7
        value: "clashai-production:us-central1:freeciv-production-db-9cc3ef1e"

  # Patch unified ServiceAccount for Workload Identity
  - target:
      kind: ServiceAccount
      name: freeciv-sa
    patch: |-
      - op: replace
        path: /metadata/annotations/iam.gke.io~1gcp-service-account
        value: "gateway-sa@clashai-production.iam.gserviceaccount.com"

  # Patch External Secret for production DB
  - target:
      kind: ExternalSecret
      name: db-credentials
    patch: |-
      - op: replace
        path: /spec/data/0/remoteRef/key
        value: "freeciv-production-db-connection-string"

  # Patch HPA limits for production
  - target:
      kind: HorizontalPodAutoscaler
      name: fciv-net-hpa
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 2
      - op: replace
        path: /spec/maxReplicas
        value: 5

  # Production resource limits
  - target:
      kind: Deployment
      name: fciv-net
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "1Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "2000m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "4Gi"

# ConfigMap generator for production-specific config
configMapGenerator:
  - name: production-config
    literals:
      - ENVIRONMENT=production
      - LOG_LEVEL=info
