apiVersion: v1
kind: Service
metadata:
  name: fciv-net
  namespace: freeciv3d
  labels:
    app: fciv-net
    component: game-server
spec:
  type: ClusterIP
  selector:
    app: fciv-net
  ports:
  - name: game
    port: 5556
    targetPort: game
    protocol: TCP
  - name: web
    port: 8080
    targetPort: web
    protocol: TCP
  sessionAffinity: ClientIP  # Maintain persistent connections
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 7200  # 2 hours for long games
