apiVersion: v1
kind: ConfigMap
metadata:
  name: fciv-net-config
  namespace: freeciv3d
  labels:
    app: fciv-net
    component: game-server
data:
  # Server configuration
  server-port: "5556"
  web-port: "8080"

  # Game configuration
  game-mode: "bot-competition"
  max-players: "4"
  turn-timeout: "300"  # 5 minutes per turn
  max-turn-count: "30"  # 30-turn build phase

  # Bot API configuration
  enable-bot-api: "true"
  bot-api-endpoint: "http://llm-gateway.freeciv3d.svc.cluster.local:9000"

  # Ruleset configuration
  ruleset: "civ2civ3"  # or "classic", "multiplayer"
  map-size: "normal"
  barbarians: "disabled"

  # Logging
  log-level: "info"
  enable-game-logs: "true"
  enable-metrics: "true"

  # Environment
  environment: "staging"
