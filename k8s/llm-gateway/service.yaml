apiVersion: v1
kind: Service
metadata:
  name: llm-gateway
  namespace: freeciv3d
  labels:
    app: llm-gateway
    component: game-integration
spec:
  type: ClusterIP
  selector:
    app: llm-gateway
  ports:
  - name: websocket
    port: 8003
    targetPort: websocket
    protocol: TCP
  - name: grpc
    port: 9000
    targetPort: grpc
    protocol: TCP
  sessionAffinity: ClientIP  # Maintain WebSocket connections
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600
